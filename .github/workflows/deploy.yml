name: Deploy Planning Intelligence to Azure Functions

on:
  push:
    branches:
      - main
      - feature/dashboard-ui
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: planning-intelligence-fn
  AZURE_FUNCTIONAPP_PACKAGE_PATH: planning_intelligence
  PYTHON_VERSION: '3.13'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: rg-ibp-s

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pushd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: Zip artifact for deployment
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          zip -r ../release.zip . \
            --exclude "tests/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "local.settings.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D355387EB64E45BE82E60445E8071CAB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DB70217F68FB4CC38FA3C938095B618C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_96410DCC7FDC4814A8DA15C4DC920677 }}

      - name: Deploy via Azure CLI zip deploy
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp deployment source config-zip \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
              --src release.zip \
              --build-remote true
